{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Mi Perfil</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                    <input type="text" name="first_name" value="{{ profile_user.first_name }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
                    <input type="text" name="last_name" value="{{ profile_user.last_name }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" value="{{ profile_user.email }}" disabled class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-500">
                <p class="text-xs text-gray-400 mt-1">El email no se puede modificar.</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
                <input type="text" value="{{ profile_user.get_role_display }}" disabled class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-500">
            </div>
            <hr class="border-gray-200">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nueva Contraseña <span class="text-gray-400 font-normal">(opcional)</span></label>
                <input type="password" name="password" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Dejar en blanco para mantener">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">Guardar Cambios</button>
                <a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
