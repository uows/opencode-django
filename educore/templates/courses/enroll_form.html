{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Inscribir Alumno</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <p class="text-sm text-gray-500 mb-4">Curso: <strong>{{ course.name }}</strong></p>
        {% if students %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Alumno</label>
                <select name="student" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Seleccionar alumno...</option>
                    {% for s in students %}
                    <option value="{{ s.pk }}">{{ s.get_full_name }} ({{ s.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">Inscribir</button>
                <a href="{% url 'course_detail' course.pk %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
            </div>
        </form>
        {% else %}
        <p class="text-gray-400 text-sm">Todos los alumnos ya están inscritos en este curso.</p>
        <a href="{% url 'course_detail' course.pk %}" class="text-primary-500 hover:text-primary-600 text-sm font-medium mt-3 inline-block">Volver</a>
        {% endif %}
    </div>
</div>
{% endblock %}
