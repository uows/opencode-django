{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
        <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">¿Eliminar "{{ subject.name }}"?</h2>
        <p class="text-gray-500 text-sm mb-6">Se eliminarán todas las notas y tareas asociadas a esta asignatura.</p>
        <form method="post" class="flex gap-3 justify-center">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">Eliminar</button>
            <a href="{% url 'course_detail' subject.course.pk %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
