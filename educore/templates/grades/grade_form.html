{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Nueva Nota</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="get" class="flex gap-3 mb-6 pb-4 border-b border-gray-200">
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-600 mb-1">Curso</label>
                <select name="course" onchange="this.form.submit()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Seleccionar...</option>
                    {% for c in courses %}
                    <option value="{{ c.pk }}" {% if selected_course|stringformat:'s' == c.pk|stringformat:'s' %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </form>

        {% if selected_course %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="course" value="{{ selected_course }}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Asignatura</label>
                <select name="subject" required onchange="this.form.submit()" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Seleccionar...</option>
                    {% for s in subjects %}
                    <option value="{{ s.pk }}" {% if selected_subject|stringformat:'s' == s.pk|stringformat:'s' %}selected{% endif %}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% if selected_subject %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Alumno</label>
                <select name="student" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Seleccionar...</option>
                    {% for s in students %}
                    <option value="{{ s.pk }}">{{ s.get_full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nota (1.0 - 7.0)</label>
                <input type="number" name="score" min="1.0" max="7.0" step="0.1" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="4.0">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Coeficiente</label>
                <input type="number" name="coefficient" min="1" value="1" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">Registrar Nota</button>
                <a href="{% url 'grade_list' %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
            </div>
            {% endif %}
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
