{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary-500 rounded-2xl flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4">EC</div>
            <h1 class="text-2xl font-bold text-gray-900">EduCore</h1>
            <p class="text-gray-500 mt-1">Plataforma de Gestión Escolar</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-6">Iniciar Sesión</h2>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" placeholder="tu@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" name="password" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-medium py-2.5 rounded-lg transition-colors">Ingresar</button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-6">
                ¿No tienes cuenta? <a href="{% url 'register' %}" class="text-primary-500 hover:text-primary-600 font-medium">Regístrate</a>
            </p>
        </div>
        {% if user.is_authenticated %}
        <div class="text-center mt-4">
            <a href="{% url 'dashboard' %}" class="text-primary-500 hover:text-primary-600 text-sm font-medium">Ir al Dashboard</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
