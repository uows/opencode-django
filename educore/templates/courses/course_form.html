{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{% if editing %}Editar Curso{% else %}Nuevo Curso{% endif %}</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                <input type="text" name="name" value="{{ course.name|default:'' }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Ej: 1° Medio A">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Grado</label>
                <select name="grade" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Seleccionar...</option>
                    {% for g in '12345678'|make_list %}
                    <option value="{{ g }}° Básico" {% if course.grade == g|add:'° Básico' %}selected{% endif %}>{{ g }}° Básico</option>
                    {% endfor %}
                    {% for g in '1234'|make_list %}
                    <option value="{{ g }}° Medio" {% if course.grade == g|add:'° Medio' %}selected{% endif %}>{{ g }}° Medio</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Año</label>
                <input type="number" name="year" value="{{ course.year|default:'' }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="2025">
            </div>
            {% if user.role == 'ADMIN' %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Profesor</label>
                <select name="teacher" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Sin asignar</option>
                    {% for t in teachers %}
                    <option value="{{ t.pk }}" {% if course.teacher.pk == t.pk %}selected{% endif %}>{{ t.get_full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">
                    {% if editing %}Guardar Cambios{% else %}Crear Curso{% endif %}
                </button>
                <a href="{% url 'course_list' %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
