{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{% if editing %}Editar Tarea{% else %}Nueva Tarea{% endif %}</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                <input type="text" name="title" value="{{ assignment.title|default:'' }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Título de la tarea">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Asignatura</label>
                <select name="subject" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
                    <option value="">Seleccionar...</option>
                    {% for s in subjects %}
                    <option value="{{ s.pk }}" {% if assignment.subject.pk == s.pk %}selected{% endif %}>{{ s.name }} ({{ s.course.name }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                <textarea name="description" rows="4" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Descripción de la tarea">{{ assignment.description|default:'' }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Entrega</label>
                <input type="datetime-local" name="due_date" value="{{ assignment.due_date|date:'Y-m-d\TH:i'|default:'' }}" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Archivo (PDF) <span class="text-gray-400 font-normal">(opcional)</span></label>
                <input type="file" name="attachment" accept=".pdf" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-primary-50 file:text-primary-600 file:text-sm">
                {% if editing and assignment.attachment %}
                <p class="text-xs text-gray-400 mt-1">Archivo actual: {{ assignment.attachment.name }}</p>
                {% endif %}
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">
                    {% if editing %}Guardar Cambios{% else %}Crear Tarea{% endif %}
                </button>
                <a href="{% url 'assignment_list' %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
