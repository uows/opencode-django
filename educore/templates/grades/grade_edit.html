{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Editar Nota</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <p class="text-sm text-gray-500 mb-4">
            {{ grade.student.get_full_name }} —
            <strong>{{ grade.subject.name }}</strong> ({{ grade.subject.course.name }})
        </p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nota (1.0 - 7.0)</label>
                <input type="number" name="score" value="{{ grade.score }}" min="1.0" max="7.0" step="0.1" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Coeficiente</label>
                <input type="number" name="coefficient" value="{{ grade.coefficient }}" min="1" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white font-medium px-6 py-2.5 rounded-lg transition-colors text-sm">Actualizar</button>
                <a href="{% url 'grade_list' %}" class="text-gray-600 hover:text-gray-800 font-medium px-6 py-2.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
